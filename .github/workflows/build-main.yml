name: CI - Main App

on:
  push:
    branches: [main]
    paths:
      - 'apps/main-app/**'
      - 'packages/shared/**'
  pull_request:
    paths:
      - 'apps/main-app/**'
      - 'packages/shared/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:main
