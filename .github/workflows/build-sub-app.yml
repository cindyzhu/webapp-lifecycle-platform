name: CI - Sub Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/sub-*/**'
  pull_request:
    paths:
      - 'apps/sub-*/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      supplier: ${{ steps.changes.outputs.supplier }}
      goods: ${{ steps.changes.outputs.goods }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            supplier:
              - 'apps/sub-supplier/**'
            goods:
              - 'apps/sub-goods/**'

  build-supplier:
    needs: detect-changes
    if: needs.detect-changes.outputs.supplier == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:supplier

  build-goods:
    needs: detect-changes
    if: needs.detect-changes.outputs.goods == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:goods
